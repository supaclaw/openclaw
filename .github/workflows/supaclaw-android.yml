name: Supaclaw Android

on:
  release:
    types:
      - created

concurrency:
  group: supaclaw-android-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    if: github.repository == 'supaclaw/openclaw'
    runs-on: ubuntu-24.04-arm
    env:
      CI: true
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          if [[ -z "$tag" ]]; then
            echo "::error::A release tag is required."
            exit 1
          fi

          safe_tag="$(printf '%s' "$tag" | tr '/: ' '---' | tr -cd '[:alnum:]._-')"
          if [[ -z "$safe_tag" ]]; then
            echo "::error::Could not derive a safe artifact suffix from tag '$tag'."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "safe_tag=$safe_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # setup-android's sdkmanager currently crashes on JDK 21 in CI.
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false
          packages: ''

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Decode Android keystore
        env:
          SUPACLAW_ANDROID_KEYSTORE_BASE64: ${{ secrets.SUPACLAW_ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPACLAW_ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "::error::Missing SUPACLAW_ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/android"
          keystore_path="$RUNNER_TEMP/android/release.keystore"
          printf '%s' "$SUPACLAW_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Write Gradle signing properties
        env:
          OPENCLAW_ANDROID_STORE_PASSWORD: ${{ secrets.SUPACLAW_ANDROID_STORE_PASSWORD }}
          OPENCLAW_ANDROID_KEY_ALIAS: ${{ secrets.SUPACLAW_ANDROID_KEY_ALIAS }}
          OPENCLAW_ANDROID_KEY_PASSWORD: ${{ secrets.SUPACLAW_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in OPENCLAW_ANDROID_STORE_PASSWORD OPENCLAW_ANDROID_KEY_ALIAS OPENCLAW_ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing $name secret."
              exit 1
            fi
          done

          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<EOF
          OPENCLAW_ANDROID_STORE_FILE=${ANDROID_KEYSTORE_PATH}
          OPENCLAW_ANDROID_STORE_PASSWORD=${OPENCLAW_ANDROID_STORE_PASSWORD}
          OPENCLAW_ANDROID_KEY_ALIAS=${OPENCLAW_ANDROID_KEY_ALIAS}
          OPENCLAW_ANDROID_KEY_PASSWORD=${OPENCLAW_ANDROID_KEY_PASSWORD}
          EOF

      - name: Build Android release APK
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Stage release APK
        run: |
          set -euo pipefail
          mkdir -p artifacts
          found_apk="$(find apps/android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [[ -z "$found_apk" ]]; then
            echo "::error::No release APK was produced."
            exit 1
          fi

          cp "$found_apk" "artifacts/openclaw-${{ steps.release.outputs.safe_tag }}-android.apk"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supaclaw-android-${{ steps.release.outputs.safe_tag }}-${{ github.run_id }}
          path: artifacts/*.apk
          retention-days: 7

      - name: Validate release exists
        env:
          GH_TOKEN: ${{ secrets.SUPACLAW_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release view "$RELEASE_TAG"

      - name: Upload Android assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.SUPACLAW_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" artifacts/*.apk --clobber
